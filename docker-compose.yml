services:
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: techmind-oracle-db
    ports:
      - "1521:1521"
    environment:
      ORACLE_PWD: ${ORACLE_SYS_PASSWORD:-TechmindSys123}
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./docker/oracle/startup:/opt/oracle/scripts/startup:ro
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: techmind-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      ORACLE_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
      ORACLE_DB_USERNAME: ${ORACLE_DB_USERNAME:-TECHMIND_APP}
      ORACLE_DB_PASSWORD: ${ORACLE_DB_PASSWORD:-TechmindApp123}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-AQ.Ab8RN6L5YMC575S6qd-VbBuH17epr8Vfz1uIi_inpQO00uv8vA}
    depends_on:
      - oracle-db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: techmind-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  oracle-data: